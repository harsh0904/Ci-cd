name: CI/CD Pipeline 🚀

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── JOB 1: Build & Push Docker Image ───────────────────────────────
  build-and-push:
    name: 🐳 Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔑 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🏗️ Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/cicd-project:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/cicd-project:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 📋 Image digest summary
        run: |
          echo "✅ Docker image pushed:"
          echo "  → ${{ secrets.DOCKERHUB_USERNAME }}/cicd-project:latest"
          echo "  → ${{ secrets.DOCKERHUB_USERNAME }}/cicd-project:${{ github.sha }}"

  # ─── JOB 2: Deploy to Kubernetes (only on main branch) ──────────────
  deploy:
    name: ☸️ Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'

    steps:
      - name: 🚀 Deploy via SSH to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            export KUBECONFIG=/root/.kube/config

            echo "📦 Pulling latest Docker image..."
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/cicd-project:latest

            echo "☸️ Applying Kubernetes manifests..."
            kubectl apply -f /var/www/cicd/k8s/

            echo "🔄 Rolling out new image..."
            kubectl set image deployment/cicd-deployment \
              cicd=${{ secrets.DOCKERHUB_USERNAME }}/cicd-project:${{ github.sha }} \
              --record 2>/dev/null || true

            echo "⏳ Waiting for rollout to complete..."
            kubectl rollout status deployment/cicd-deployment --timeout=120s

            echo "✅ Deployment complete! Pods running:"
            kubectl get pods -l app=cicd-project

      - name: ✅ Verify live site
        run: |
          sleep 5
          STATUS=$(curl -sI https://cicd.snenmh.xyz | head -1)
          echo "Site status: $STATUS"
